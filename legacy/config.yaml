# iii engine configuration
# Docs: https://iii.dev/docs/how-to/configure-engine
workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: iii
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      queue_configs:
        clicks:
          type: standard
          max_retries: 5
          concurrency: 5
      adapter:
        name: builtin
  - name: iii-http
    config:
      port: 3111
      host: 127.0.0.1
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - "*"
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: in_memory
          file_path: ./data/state_store.db
  - name: link
    worker_path: /Users/frank/Desktop/builds/three-eye-framework/linkly/link
  - name: database
    config:
      databases:
        primary:
          pool:
            acquire_timeout_ms: 5000
            idle_timeout_ms: 30000
            max: 10
          url: sqlite:./data/iii.db
        analytics:
          url: sqlite:./data/analytics.db
  - name: iii-pubsub
    config:
      adapter:
        name: local
  - name: analytics
    worker_path: /Users/frank/Desktop/builds/three-eye-framework/linkly/analytics
  - name: iii-stream
    config:
      port: 3112
      host: 127.0.0.1
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/stream_store
  - name: click-streamer
    worker_path: /Users/frank/Desktop/builds/three-eye-framework/linkly/click-streamer
  - name: bulk-importer
    worker_path: /Users/frank/Desktop/builds/three-eye-framework/linkly/bulk-importer

  # Trusted listener for local workers. Replaces the engine's built-in 49134.
  - name: iii-worker-manager
    config:
      port: 49134

  # Browser-facing listener. The auth function gates every connection; only the
  # functions in `expose_functions` are reachable from sessions it admits.
  - name: iii-worker-manager
    config:
      host: 127.0.0.1
      port: 3110
      rbac:
        auth_function_id: auth::browser
        expose_functions:
          - match("link::create")
          - match("link::request_delete")
          - match("stream::*")
  - name: auth
    worker_path: /Users/frank/Desktop/builds/three-eye-framework/linkly/auth
